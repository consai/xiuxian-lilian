_comment: "默认近战：蓄力→冲锋→（受击与施法者弹回并行）→恢复待机"
sequence:
  - _comment: "停止待机呼吸，避免与攻击 Tween 抢 scale"
    op: "stop_idle"
    actor: "caster"
  - _comment: "蓄力：后撤 + 压扁（并行）"
    op: "parallel"
    actor: "caster"
    steps:
      - op: "tween"
        prop: "position"
        to:
          anchor: "windup"
        duration_key: "melee.windup_duration"
        trans_key: "melee.windup_trans"
        ease_key: "melee.windup_ease"
      - op: "tween"
        prop: "scale"
        to:
          anchor: "melee_squash"
        duration_key: "melee.windup_duration"
        trans_key: "melee.windup_trans"
        ease_key: "melee.windup_ease"
  - _comment: "冲锋至目标前方"
    op: "tween"
    actor: "caster"
    prop: "position"
    to:
      anchor: "strike"
    duration_key: "melee.dash_duration"
    trans_key: "melee.dash_trans"
    ease_key: "melee.dash_ease"
  - _comment: "命中帧：目标受击与施法者弹回各自并行执行"
    op: "parallel"
    steps:
      - _comment: "施法者：恢复缩放与回静止位"
        op: "parallel"
        actor: "caster"
        steps:
          - op: "tween"
            prop: "scale"
            to:
              anchor: "rest_scale"
            duration: 0.077
            trans_key: "melee.return_trans"
            ease_key: "melee.return_ease"
          - op: "tween"
            prop: "position"
            to:
              anchor: "rest"
            duration_key: "melee.return_duration"
            trans_key: "melee.return_trans"
            ease_key: "melee.return_ease"
      - _comment: "目标：受击反馈（hit_default）"
        op: "impact"
  - _comment: "恢复待机呼吸"
    op: "resume_idle"
    actor: "caster"
