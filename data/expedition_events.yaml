schema_version: 2
events:
  qinglan_fog:
    id: "qinglan_fog"
    location_id: "wild_wolf_valley"
    type: "hazard"
    name: "迷障浓雾"
    desc: "雾气耗散法力，需小心前行。"
    risk_text: "轻微"
    weight: 20
    difficulty: 1
    once_per_expedition: false
    effects:
      - type: "drain_mp_percent"
        value: 0.15
    tags:
      - "hazard"
    conditions: []
    results:
      - type: "effects"
        effects:
          - type: "drain_mp_percent"
            value: 0.15
  qinglan_cliff:
    id: "qinglan_cliff"
    location_id: "wild_wolf_valley"
    type: "hazard"
    name: "断崖滑坠"
    desc: "碎石滚落，擦伤难免。"
    risk_text: "危险"
    weight: 14
    difficulty: 3
    once_per_expedition: false
    effects:
      - type: "damage_hp_percent"
        value: 0.12
    tags:
      - "hazard"
    conditions: []
    results:
      - type: "effects"
        effects:
          - type: "damage_hp_percent"
            value: 0.12
  qinglan_wolf_tracks:
    id: "qinglan_wolf_tracks"
    location_id: "wild_wolf_valley"
    type: "decision"
    mode: "decision"
    name: "狼踪再现"
    desc: "泥地上留着新鲜爪印，是否要追踪狼踪？"
    risk_text: "抉择"
    weight: 14
    difficulty: 2
    once_per_expedition: false
    options:
      - id: "track"
        label: "追踪狼踪"
        desc: "深入林间，可能遭遇狼群伏击。"
        risk_text: "危险"
        trigger_event: "qinglan_wolf"
    tags:
      - "decision"
    conditions: []
    results: []
  qinglan_injured_cultivator:
    id: "qinglan_injured_cultivator"
    location_id: "wild_wolf_valley"
    type: "decision"
    mode: "decision"
    name: "遇伤修士"
    desc: "一名散修靠在岩边喘息，向你求助。"
    risk_text: "抉择"
    weight: 12
    difficulty: 1
    once_per_expedition: false
    options:
      - id: "help"
        label: "出手相助"
        desc: "匀出丹药与法力，换取对方谢礼。"
        risk_text: "消耗"
        effects:
          - type: "drain_mp_percent"
            value: 0.12
        rewards:
          - kind: "item"
            id: "items_HuiQiDan"
            min: 1
            max: 1
            weight: 3
          - kind: "currency"
            id: "ling_stones"
            min: 8
            max: 18
            weight: 2
      - id: "ignore"
        label: "径直离开"
        desc: "历练凶险，不宜节外生枝。"
        risk_text: "冷淡"
        effects: []
        rewards: []
    tags:
      - "decision"
    conditions: []
    results: []
  qinglan_wolf:
    id: "qinglan_wolf"
    location_id: "wild_wolf_valley"
    type: "battle"
    mode: "auto"
    name: "青牙狼袭"
    desc: "狼群自林间扑出。"
    risk_text: "普通"
    weight: 24
    difficulty: 1
    once_per_expedition: false
    effects: []
    tags:
      - "battle"
    conditions: []
    results:
      - type: "drop"
        drop_pool: "monster:qinglan_wolf"
        rolls: 2
    enemy_pool: "qinglan_wolf"
  qinglan_serpent:
    id: "qinglan_serpent"
    location_id: "wild_wolf_valley"
    type: "elite"
    name: "寒潭妖蟒"
    desc: "潭底巨蟒破水而出。"
    risk_text: "精英"
    weight: 12
    difficulty: 3
    once_per_expedition: false
    effects: []
    tags:
      - "elite"
    conditions: []
    results:
      - type: "drop"
        drop_pool: "monster:qinglan_serpent"
        rolls: 3
    enemy_pool: "qinglan_serpent"
  qinglan_boss:
    id: "qinglan_boss"
    location_id: "wild_wolf_valley"
    type: "boss"
    name: "赤焰妖王"
    desc: "山巅妖王威压如山。"
    risk_text: "首领"
    weight: 6
    difficulty: 6
    once_per_expedition: true
    effects: []
    tags:
      - "boss"
    conditions: []
    results:
      - type: "drop"
        drop_pool: "monster:qinglan_boss"
        rolls: 4
    enemy_pool: "qinglan_boss"
