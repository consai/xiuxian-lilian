schema_version: 1
id: "prologue.fragment"
entry: "wake"
nodes:
  wake:
    type: "line"
    speaker: "炼丹小札"
    text: "小道观晨钟已响。先确认自己还能引气入体。"
    next: "first_choice"
    meta:
      backdrop: "cave_hub"
      music: "quiet_cave"
  first_choice:
    type: "choice"
    prompt: "你准备如何回应？"
    choices:
      - id: "steady"
        label: "静心运气"
        hint: "稳住心神，再作打算。"
        effects:
          - op: "set"
            flag: "prologue.calm"
            value: true
        next: "guide_cultivate"
      - id: "search"
        label: "翻看小札夹页"
        hint: "也许夹页里还写着今日安排。"
        effects:
          - op: "set"
            flag: "prologue.asked_master"
            value: true
        next: "master_answer"
  master_answer:
    type: "line"
    speaker: "炼丹小札"
    text: "早课之后去青岚山巡一圈，记得带回炉边要用的灵草。"
    next: "guide_cultivate"
  guide_cultivate:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "hub.cultivate_button"
        reason: "完成一次修炼"
      - type: "await_game_event"
        event: "cultivation.completed"
    next: "chapter_end"
  chapter_end:
    type: "end"
    result: "completed"
