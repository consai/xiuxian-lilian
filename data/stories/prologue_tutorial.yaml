schema_version: 1
id: "prologue_tutorial"
entry: "empty_cave"
nodes:
  empty_cave:
    type: "line"
    speaker: ""
    text: "山风从清铃观檐角吹过，铜铃叮当响了三声。你从蒲团上坐起来，尾巴还压着半张炼丹小札。"
    meta:
      narration: true
    next: "jade_message"
  jade_message:
    type: "line"
    speaker: ""
    text: "小道观晨光正好，丹炉冷着，药架也空了些。小札第一页写着：先闭关一个月，再下山看看山路。"
    meta:
      narration: true
    next: "master_confession"
  master_confession:
    type: "line"
    speaker: "炼丹小札"
    text: "聚气丹能帮你快些引气，但药力来得急。闭关之后若灵气浮躁，就去巡山压一压。"
    next: "master_last_trip"
  master_last_trip:
    type: "line"
    speaker: ""
    text: "你把小背篓挂好，又摸了摸炉边瓷盏。若一切顺利，这个月末观里该有第一缕药香。"
    next: "open_pill_cultivation"
  open_pill_cultivation:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "CultivateObjectButton"
        reason: "开始闭关：打开修炼界面"
      - type: "await_game_event"
        event: "tutorial.cultivation_panel_opened"
    next: "select_pill"
  select_pill:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "PillButton"
        reason: "闭关以月为单位结算。\n选择【丹药炼化】，用聚气丹完成首月修炼"
      - type: "await_game_event"
        event: "tutorial.pill_mode_selected"
    next: "start_pill"
  start_pill:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "StartButton"
        reason: "开始闭关一个月"
      - type: "await_game_event"
        event: "tutorial.cultivation_result_shown"
    next: "pill_result"
  pill_result:
    type: "line"
    speaker: ""
    text: "一个月闭关后，聚气丹化开的灵气像热乎乎的云，把经脉塞得鼓鼓的。可云气有些飘，光靠坐着不容易压稳。"
    meta:
      narration: true
    next: "return_pill"
  return_pill:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "ConfirmButton"
        reason: "确认闭关结果，准备出门巡山压稳灵气"
      - type: "await_game_event"
        event: "tutorial.cultivation_completed"
    next: "open_map"
  open_map:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "ExpeditionObjectButton"
        reason: "出门巡山：压稳灵气，并采些炼丹灵草"
      - type: "await_game_event"
        event: "tutorial.world_map_opened"
    next: "choose_wolf_valley"
  choose_wolf_valley:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "WildWolfValley"
        reason: "选择野狼谷，那里有今日要采的灵草"
      - type: "await_game_event"
        event: "tutorial.wolf_valley_selected"
    next: "depart_wolf_valley"
  depart_wolf_valley:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "EnterButton"
        reason: "背上小篓，出门巡山"
      - type: "await_game_event"
        event: "tutorial.expedition_started"
    next: "mountain"
  mountain:
    type: "line"
    speaker: ""
    text: "雨后的野狼谷带着草木清气。石阶旁有新鲜爪印，也有几株冒头的灵草。"
    meta:
      narration: true
    next: "wait_battle"
  wait_battle:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "TutorialNextMapNode"
        reason: "沿路线先前往采集点采药，再迎战拦路的野狼"
      - type: "await_game_event"
        event: "tutorial.first_battle_won"
    next: "battle_press"
  battle_press:
    type: "line"
    speaker: ""
    text: "山路上一场小小争斗后，乱窜的灵气终于安分下来。你拍拍衣摆，把几株灵草收进小背篓。"
    meta:
      narration: true
    next: "return_expedition"
  return_expedition:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "ExitButton"
        reason: "带着灵草返程，保住今日收获"
      - type: "await_game_event"
        event: "tutorial.expedition_returned"
    next: "close_expedition_result"
  close_expedition_result:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "ReturnButton"
        reason: "查看灵气压稳与材料收获，返回小道观"
      - type: "await_game_event"
        event: "tutorial.result_closed"
    next: "home"
  home:
    type: "line"
    speaker: ""
    text: "山门风铃又响了一声。小背篓里的灵草带着露水，丹炉也该重新热起来了。"
    meta:
      narration: true
    next: "open_backpack"
  open_backpack:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "BackpackButton"
        reason: "打开背包，确认巡山带回来的灵草"
      - type: "await_game_event"
        event: "tutorial.backpack_opened"
    next: "close_backpack"
  close_backpack:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "CloseButton"
        reason: "灵草已经收好，先合上背包再操作丹炉"
      - type: "await_game_event"
        event: "tutorial.backpack_closed"
    next: "open_alchemy"
  open_alchemy:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "FurnaceButton"
        reason: "打开丹炉，把巡山灵草炼成丹药"
      - type: "await_game_event"
        event: "tutorial.alchemy_opened"
    next: "preview_alchemy"
  preview_alchemy:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "TutorialPreviewClickArea"
        reason: "查看预览区域，点击继续"
      - type: "await_game_event"
        event: "tutorial.alchemy_preview_acknowledged"
    next: "brew_first"
  brew_first:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "BrewButton"
        reason: "开炉炼制第一炉丹药"
      - type: "await_game_event"
        event: "tutorial.alchemy_result_shown"
    next: "alchemy_result"
  alchemy_result:
    type: "line"
    speaker: ""
    text: "炉火一跳，第一炉丹药滚进瓷盏。小道观里有了药香，也有了明天的早课。"
    meta:
      narration: true
    next: "finish_alchemy"
  finish_alchemy:
    type: "command"
    commands:
      - type: "guide_focus"
        target: "ReturnButton"
        reason: "收起丹药，返回观中"
      - type: "await_game_event"
        event: "tutorial.alchemy_completed"
    next: "last_words"
  last_words:
    type: "line"
    speaker: "炼丹小札"
    text: "今日早课已毕。明日是继续打坐，还是再去巡山，就由小观主自己安排。"
    next: "chapter_end"
  chapter_end:
    type: "end"
    result: "completed"
