  refresh_days: 30 # TODO: use GameTimeService cadence once implementation is allowed

weituo:
  qingxin_herb_delivery_001:
    id: "qingxin_herb_delivery_001"
    title: "采药急件"
    issuer: "清风洞府"
    desc: "宗门药房急需一批草药，望道友相助。"
    repeatable: true
    ui:
      portrait: "res://assets/art/characters/001_cutout_483x512.png"
      badge: "可接受"
    requirements:
      - kind: "item"
        id: "items_LingCao"
        label: "清心草"
        count: 3
        consume: true
      - kind: "item"
        id: "items_LingGuo"
        label: "灵芝"
        count: 2
        consume: true
    rewards:
      - kind: "item"
        id: "items_LingCao"
        count: 10
      - kind: "item"
        id: "items_XuanJin"
        count: 20
      - kind: "currency"
        id: "ling_stones"
        count: 500

  qinglan_patrol_001:
    id: "qinglan_patrol_001"
    title: "巡青岚山路"
    issuer: "山下村正"
