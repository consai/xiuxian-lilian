schemaVersion: 4
configId: "abilities"
metadata:
  name: "技能配置"
  description: "技能自身配置学习门槛，知识提供门槛后的效果成长"
  abilityCount: 45
rules:
  knowledgeTreeConfigId: "dao_tree"
  cultivationMethodConfigId: "cultivation_methods"
  learningPolicy: "ability_config_knowledge_requirements"
  knowledgeMasteryFormula: "sum(clamp((effective_level - requiredLevel) / (5 - requiredLevel), 0, 1) * normalized(scalingWeight))"
  effectFormula: "base + knowledgeGrowth * weightedKnowledgeMastery, then apply scalingMode and clamps"
  types:
    - "combat_active"
    - "combat_passive"
    - "combat_upkeep"
    - "general_passive"
  generalPassivePolicy: "always_active_after_learning_same_stack_group_uses_highest"
  combatPassivePolicy: "active_when_equipped"
  combatUpkeepPolicy: "active_while_toggled_and_upkeep_cost_is_paid"
  combatActivePolicy: "cast_from_combat_skill_slot"
  generalPassiveStackPolicy: "highest"
  effectCatalogConfigId: "effect_catalog"
  targetSelectionPolicy:
    defaultSingleTarget: "current_selectable_enemy"
    lowestHpPolicy: "current_selectable_enemy_only"
    backlinePolicy: "protected_by_frontline_no_direct_target"
    exposedPolicy: "backline_can_be_targeted_only_when_exposed_or_frontline_cleared"
    areaPolicy: "area_line_pierce_splash_domain_may_affect_backline_indirectly"
  specialActionControlPolicy:
    realtimeCastingTarget: false
    priorityTarget: "current_selectable_high_threat_enemy"
    sealPolicy: "delay_or_seal_next_special_action"
    triggerField: "hasPriorityEnemy"
  learningKnowledgeGatePolicy:
    ordinaryQualities:
      - 1
      - 2
    ordinaryPolicy: "realm_only_no_knowledge_requirements"
    specialPolicy: "quality_3_or_above_may_require_knowledge"
    maxKnowledgeRequirements: 2
    maxRequirementLevel: 2
    note: "知识仍可参与 knowledgeScaling 成长，但下品与中品技能学习不被知识卡住。"
