schemaVersion: 2
configId: "cultivation_methods"
metadata:
  name: "功法体系"
  description: "开放学习、分层传承、旁门分支及知识加权反哺的功法体系"
  familyCount: 23
  methodCount: 91
  effectTypeCount: 175
rules:
  knowledgeTreeConfigId: "dao_tree"
  learningPolicy: "knowledge_threshold_only"
  methodMasteryMax: 1
  masteryBonusMax: 0.5
  blockedKnowledgeXpPolicy: "discard"
  knowledgeExperience:
    accumulationPolicy: "immediately_apply_to_level_progress"
    stopAtConfiguredCap: true
    noOverflowStorage: true
    nonCultivatableSkillIds:
      - "foundation.meridians"
      - "foundation.literacy"
      - "cultivation.qi_sense"
      - "spell.escape"
      - "alchemy.poison"
      - "talisman.script"
      - "talisman.activation"
      - "heaven.omen"
    note: "这些知识只能通过学习、使用或后续生活技能系统增长。"
  knowledgeGainFormula: "practice_xp * knowledgeXpRatio * normalized(growthWeight)"
  knowledgeMasteryFormula: "min(effective_skill_level / capLevel, 1)"
  masteryWeightFormula: "masteryWeight * capLevel ^ 2"
  weightedMasteryFormula: "sum(knowledge_mastery * normalized(masteryWeight * capLevel ^ 2))"
  effectFormula: "base_effect * (1 + masteryBonusMax * weighted_knowledge_mastery)"
  effectiveSkillLevelFormula: "level + current_level_xp / required_level_xp"
  layerInheritance:
    recursive: true
    knowledge:
      inheritedGrowthWeightMultiplierPerTierDistance: 0.35
      inheritedCapBonusPerUpgrade: 1
      maximumCapLevel: 5
      mergePolicy: "same_skill_uses_highest_cap_and_nearest_growth_weight"
    effects:
      inheritPreviousEffects: false
      mergePolicy: "current_method_only"
      note: "高层功法只激活当前层效果，旧层效果需切回旧功法或由当前层显式重申。"
effectDefinitions:
  activation: "active_method"
  defaultOperation: "add_percent"
  stackPolicies:
    highest: "同一 stackGroup 仅取最高值"
    add_capped: "同一 stackGroup 相加后受 cap 限制"
    unique: "同一来源只生效一次"
  valueFormula: "base + masteryGrowth * method_mastery"
  knowledgeScales: "empty means use all current method knowledge; otherwise use only listed knowledge"
  catalogConfigId: "effect_catalog"
